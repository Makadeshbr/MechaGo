<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#635200",
              "inverse-on-surface": "#565554",
              "background": "#0e0e0e",
              "tertiary": "#f6ffc2",
              "surface": "#0e0e0e",
              "secondary-fixed-dim": "#e4d844",
              "on-primary-fixed-variant": "#645300",
              "surface-container-high": "#201f1f",
              "on-tertiary": "#576500",
              "surface-variant": "#262626",
              "primary-fixed-dim": "#edc600",
              "on-primary-container": "#594a00",
              "inverse-primary": "#715d00",
              "secondary-container": "#676000",
              "surface-container": "#1a1919",
              "secondary": "#f3e651",
              "on-surface": "#ffffff",
              "surface-container-lowest": "#000000",
              "on-tertiary-container": "#4f5d00",
              "outline": "#777575",
              "on-error-container": "#ffd2c8",
              "on-error": "#450900",
              "on-secondary-container": "#fff9d2",
              "surface-bright": "#2c2c2c",
              "surface-container-highest": "#262626",
              "secondary-fixed": "#f3e651",
              "primary-fixed": "#fdd404",
              "inverse-surface": "#fcf8f8",
              "surface-tint": "#ffe484",
              "on-secondary-fixed": "#454100",
              "on-tertiary-fixed": "#414d00",
              "on-secondary": "#595300",
              "primary": "#ffe484",
              "error": "#ff7351",
              "on-secondary-fixed-variant": "#645d00",
              "error-dim": "#d53d18",
              "tertiary-fixed": "#e4fc73",
              "tertiary-container": "#dff66e",
              "secondary-dim": "#e4d844",
              "error-container": "#b92902",
              "tertiary-fixed-dim": "#d6ee67",
              "on-tertiary-fixed-variant": "#5c6b00",
              "primary-container": "#fdd404",
              "on-background": "#ffffff",
              "tertiary-dim": "#d6ee67",
              "on-surface-variant": "#adaaaa",
              "surface-dim": "#0e0e0e",
              "surface-container-low": "#131313",
              "on-primary-fixed": "#433700",
              "primary-dim": "#edc600",
              "outline-variant": "#494847"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body flex justify-center">
<main class="w-full max-w-[420px] min-h-screen bg-surface flex flex-col relative pb-32">
<!-- Top Navigation -->
<header class="fixed top-0 w-full max-w-[420px] z-50 flex justify-between items-center px-6 h-16 bg-surface">
<button class="flex items-center justify-center h-10 w-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back_ios_new</span>
</button>
<div class="text-2xl font-black italic tracking-tighter text-primary-container uppercase font-headline">
                MechaGo
            </div>
<div class="w-10"></div>
</header>
<!-- Content Spacer -->
<div class="h-16"></div>
<!-- Section 01: VEÍCULO -->
<section class="mt-8 px-6">
<span class="text-primary font-bold tracking-[0.3em] text-[10px] uppercase block mb-2">01. VEÍCULO</span>
<div class="flex justify-between items-end mb-6">
<h1 class="font-headline text-[28px] font-bold tracking-tight text-on-surface">Qual carro?</h1>
<button class="flex items-center gap-1 px-4 py-2 bg-surface-container-high rounded-full text-primary font-bold text-sm transition-all active:scale-95">
<span class="material-symbols-outlined text-sm">add</span>
                    Novo
                </button>
</div>
<!-- Horizontal Vehicle Scroll -->
<div class="flex gap-4 overflow-x-auto no-scrollbar pb-4 -mx-6 px-6">
<!-- Selected Vehicle -->
<div class="flex-shrink-0 w-44 p-5 bg-primary-container rounded-xl flex flex-col items-start gap-4 transition-transform active:scale-95">
<div class="h-10 w-10 flex items-center justify-center bg-on-primary-container/10 rounded-lg">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div>
<p class="text-[10px] font-bold uppercase tracking-wider text-on-primary-container/60">Porsche</p>
<h3 class="text-on-primary-container font-headline font-bold text-lg leading-tight">911 Carrera S</h3>
<p class="text-on-primary-container/80 text-xs mt-1">Placa ABC-1234</p>
</div>
</div>
<!-- Inactive Vehicle -->
<div class="flex-shrink-0 w-44 p-5 bg-surface-container rounded-xl flex flex-col items-start gap-4 transition-colors active:bg-surface-container-high">
<div class="h-10 w-10 flex items-center justify-center bg-surface-container-high rounded-lg">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div>
<p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">BMW</p>
<h3 class="text-on-surface font-headline font-bold text-lg leading-tight">M3 Sedan</h3>
<p class="text-on-surface-variant text-xs mt-1">Placa XYZ-9876</p>
</div>
</div>
<!-- Inactive Vehicle -->
<div class="flex-shrink-0 w-44 p-5 bg-surface-container rounded-xl flex flex-col items-start gap-4">
<div class="h-10 w-10 flex items-center justify-center bg-surface-container-high rounded-lg">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div>
<p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Toyota</p>
<h3 class="text-on-surface font-headline font-bold text-lg leading-tight">Hilux GR-S</h3>
<p class="text-on-surface-variant text-xs mt-1">Placa DEF-4567</p>
</div>
</div>
</div>
</section>
<!-- Section 02: DIAGNÓSTICO -->
<section class="mt-10 px-6">
<span class="text-primary font-bold tracking-[0.3em] text-[10px] uppercase block mb-2">02. DIAGNÓSTICO</span>
<h2 class="font-headline text-[28px] font-bold tracking-tight text-on-surface mb-6">Qual o problema?</h2>
<!-- Problem Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Item 1: Pneu Furado -->
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-start gap-3 text-left transition-all hover:bg-surface-container-high active:scale-95 group border border-transparent focus:border-primary-container/30">
<div class="bg-surface-container-high p-2 rounded-lg group-hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-primary-container">tire_repair</span>
</div>
<span class="text-tertiary-dim bg-tertiary-container/10 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">SIMPLES R$30</span>
<p class="font-headline font-bold text-on-surface">Pneu furado</p>
</button>
<!-- Item 2: Bateria -->
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-start gap-3 text-left transition-all hover:bg-surface-container-high active:scale-95 group">
<div class="bg-surface-container-high p-2 rounded-lg group-hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-primary-container">battery_charging_full</span>
</div>
<span class="text-secondary-dim bg-secondary-container/10 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">MÉDIO R$50</span>
<p class="font-headline font-bold text-on-surface">Bateria</p>
</button>
<!-- Item 3: Pane Elétrica -->
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-start gap-3 text-left transition-all hover:bg-surface-container-high active:scale-95 group">
<div class="bg-surface-container-high p-2 rounded-lg group-hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-primary-container">bolt</span>
</div>
<span class="text-secondary-dim bg-secondary-container/10 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">MÉDIO R$50</span>
<p class="font-headline font-bold text-on-surface">Pane elétrica</p>
</button>
<!-- Item 4: Motor -->
<button class="bg-surface-container p-4 rounded-xl flex flex-col items-start gap-3 text-left transition-all hover:bg-surface-container-high active:scale-95 group">
<div class="bg-surface-container-high p-2 rounded-lg group-hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-primary-container">home_repair_service</span>
</div>
<span class="text-error bg-error-container/10 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider">COMPLEXO R$120</span>
<p class="font-headline font-bold text-on-surface">Motor</p>
</button>
</div>
<!-- Additional Help Card -->
<div class="mt-8 p-6 bg-surface-container-low rounded-2xl flex items-center gap-4 border-l-4 border-primary-container">
<span class="material-symbols-outlined text-primary-container text-3xl">info</span>
<p class="text-sm text-on-surface-variant font-medium leading-relaxed">
                    Não sabe o que aconteceu? Peça um <span class="text-on-surface font-bold">Diagnóstico Presencial</span> no local.
                </p>
</div>
</section>
<!-- Sticky Footer CTA -->
<div class="fixed bottom-0 w-full max-w-[420px] p-6 bg-gradient-to-t from-surface via-surface/95 to-transparent">
<button class="w-full h-16 bg-primary-container rounded-xl flex items-center justify-between px-6 transition-all hover:bg-primary-dim active:scale-95 shadow-2xl shadow-primary-container/20 group">
<span class="text-on-primary-container font-headline font-black text-base uppercase tracking-widest">Próximo: Estimativa</span>
<span class="material-symbols-outlined text-on-primary-container font-bold group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
</body></html>
