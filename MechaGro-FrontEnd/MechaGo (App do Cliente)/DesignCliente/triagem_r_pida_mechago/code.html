<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>

              "secondary": "#f3e651",
              "on-surface": "#ffffff",
              "surface-container-lowest": "#000000",
              "on-tertiary-container": "#4f5d00",
              "outline": "#777575",

              "on-error": "#450900",

              "error": "#ff7351",

              "error-dim": "#d53d18",
              "tertiary-fixed": "#e4fc73",

              "secondary-dim": "#e4d844",
              "error-container": "#b92902",
              "tertiary-fixed-dim": "#d6ee67",
              "on-tertiary-fixed-variant": "#5c6b00",
              "primary-container": "#fdd404",
              "on-background": "#ffffff",
              "tertiary-dim": "#d6ee67",

              "surface-dim": "#0e0e0e",

              "primary-dim": "#edc600",
              "outline-variant": "#494847"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0e0e0e; color: #ffffff; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-90 transition-transform text-[#fdd404]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase font-headline">MechaGo</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-white/10">
<img class="w-full h-full object-cover" data-alt="User profile photo avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaz0ADjEsZAeO8b9JexrEE9HpaPCHHKpGX34uUkpU3lhxSVs5dDvRwnolZV8CLSO8jWeF4IPHNHbicndDiXyVGEonhxLZVe8USqbddJBg2h8DpmQ8HbZJouvE0SCBPOdGDhBhotKOew07V_7T1uGr12-18I-oXS3lSNmW-xE1wFY093NewAI7KGyERKfZ09S6pdLue6dLQ8nv7mzTjrWOWUgLZWgYwhx_lm92LG_Io6j2VWGeBSeNIqsxCjbDeMCsgNthMJH_U8x2M"/>
</div>
</header>
<main class="w-full max-w-[420px] px-6 pt-24 pb-32 flex flex-col gap-8">
<!-- Section Header -->
<section class="flex flex-col gap-2">
<span class="font-headline text-[#fdd404] font-bold tracking-[0.2em] text-xs">03. TRIAGEM</span>
<h2 class="font-headline text-4xl font-bold tracking-tight text-on-surface">Conta mais pra gente</h2>
<p class="text-on-surface-variant text-sm font-medium">Responda rapidamente para uma pré-análise técnica precisa.</p>
</section>
<!-- Triage Questions -->
<section class="flex flex-col gap-10">
<!-- Question 01 -->
<div class="flex flex-col gap-4">
<label class="text-on-surface font-headline font-semibold text-lg flex items-center gap-3">
<span class="w-6 h-6 flex items-center justify-center bg-surface-container-high rounded-full text-[10px] text-[#fdd404]">01</span>
                    O painel acende?
                </label>
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl bg-primary-container text-on-primary-container font-bold text-sm transition-all active:scale-95">Sim</button>
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-sm hover:bg-surface-container-high transition-all active:scale-95">Não</button>
</div>
</div>
<!-- Question 02 -->
<div class="flex flex-col gap-4">
<label class="text-on-surface font-headline font-semibold text-lg flex items-center gap-3">
<span class="w-6 h-6 flex items-center justify-center bg-surface-container-high rounded-full text-[10px] text-[#fdd404]">02</span>
                    As luzes funcionam?
                </label>
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-sm hover:bg-surface-container-high transition-all active:scale-95">Sim</button>
<button class="flex-1 py-3 px-4 rounded-xl bg-primary-container text-on-primary-container font-bold text-sm transition-all active:scale-95">Não</button>
</div>
</div>
<!-- Question 03 -->
<div class="flex flex-col gap-4">
<label class="text-on-surface font-headline font-semibold text-lg flex items-center gap-3">
<span class="w-6 h-6 flex items-center justify-center bg-surface-container-high rounded-full text-[10px] text-[#fdd404]">03</span>
                    Tentou dar partida?
                </label>
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-sm hover:bg-surface-container-high transition-all active:scale-95">Sim</button>
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-sm hover:bg-surface-container-high transition-all active:scale-95">Não</button>
</div>
</div>
<!-- Question 04 (Pills Multi-select) -->
<div class="flex flex-col gap-4">
<label class="text-on-surface font-headline font-semibold text-lg flex items-center gap-3">
<span class="w-6 h-6 flex items-center justify-center bg-surface-container-high rounded-full text-[10px] text-[#fdd404]">04</span>
                    Há quanto tempo parou?
                </label>
<div class="flex flex-wrap gap-2">
<button class="py-2 px-5 rounded-full bg-surface-container-high text-on-surface text-xs font-bold border border-white/5 hover:bg-surface-container-highest transition-colors active:scale-95">Agora</button>
<button class="py-2 px-5 rounded-full bg-primary-container text-on-primary-container text-xs font-bold active:scale-95">&lt; 1h</button>
<button class="py-2 px-5 rounded-full bg-surface-container-high text-on-surface text-xs font-bold border border-white/5 hover:bg-surface-container-highest transition-colors active:scale-95">&lt; 6h</button>
<button class="py-2 px-5 rounded-full bg-surface-container-high text-on-surface text-xs font-bold border border-white/5 hover:bg-surface-container-highest transition-colors active:scale-95">&gt; 6h</button>
</div>
</div>
<!-- Additional Info -->
<div class="flex flex-col gap-4">
<label class="text-on-surface font-headline font-semibold text-lg flex items-center gap-3">
<span class="w-6 h-6 flex items-center justify-center bg-surface-container-high rounded-full text-[10px] text-[#fdd404]">05</span>
                    Algo mais que devemos saber?
                </label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl p-4 text-on-surface placeholder:text-gray-600 focus:ring-1 focus:ring-primary/40 transition-all font-body text-sm resize-none" placeholder="Ex: Cheiro de queimado, barulho metálico..." rows="3"></textarea>
<p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold px-1">Opcional</p>
</div>
</section>
<!-- Primary Action -->
<section class="mt-4">
<button class="w-full bg-primary-container text-on-primary-container py-5 rounded-2xl flex items-center justify-center gap-3 font-headline font-black uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_10px_30px_rgba(253,212,4,0.2)]">
                Ver estimativa
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</section>
</main>
<!-- BottomNavBar (Hidden on specific task but provided per design system shell visibility rules for app top-level) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0e0e0e]/70 backdrop-blur-xl border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="emergency_share">emergency_share</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">SOS</span>
</a>
<a class="flex flex-col items-center justify-center text-[#fdd404] bg-[#fdd404]/10 rounded-xl px-3 py-1 active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Vehicles</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
