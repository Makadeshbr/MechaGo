<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .sos-gradient {
            background: linear-gradient(135deg, #ff7351 0%, #d53d18 100%);
        }
        .custom-shadow {
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .glow-dot {
            box-shadow: 0 0 12px #d6ee67;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body antialiased selection:bg-primary selection:text-on-primary">
<div class="max-w-[420px] mx-auto min-h-screen relative flex flex-col pb-32">
<!-- TopAppBar (Shared Component) -->
<header class="fixed top-0 w-full max-w-[420px] z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e] bg-[#131313]">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[#fdd404]">menu</span>
</button>
<h1 class="text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase font-['Space_Grotesk']">MechaGo</h1>
</div>
<div class="hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<div class="w-10 h-10 rounded-full border border-primary/20 p-0.5 overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover rounded-full" data-alt="Close up portrait of a stylish man for profile photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnuUXeLPJeane1H-e_GOAs_qgkJuJdaXx89WMcCfk2wtWmY31UR8Z3E8PBU5tB7P5HvMMlXvDl_zlRgPWw0wrMeIg1cnevFlMD9Mf9h3nK8PfWysdePq2oLesMmsPh7wTDNU4Lb0ob8AhXtwrmW1ufKzqpSJG_6CXReI48jQKRQ2E0MLu-eb4GOM1rdZGFdcJThVOv2OGzdw0XiRKwdCHqi91cmuVvy5ZSAytXCUfPPsJImLLhKoneuwMnhWuYDleMxvTZCag6yivV"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="mt-20 px-6 flex-1 space-y-8">
<!-- Status & Location Pill -->
<section class="flex flex-col gap-3">
<div class="inline-flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full w-fit">
<span class="w-2 h-2 rounded-full bg-tertiary-fixed-dim glow-dot"></span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-tertiary-fixed-dim">MODO URBANO</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm">location_on</span>
<span class="text-sm font-medium">São Paulo, SP</span>
</div>
</section>
<!-- Greeting Section -->
<section class="space-y-1">
<h2 class="text-[38px] font-black leading-none tracking-tight font-headline">Olá, Allan</h2>
<p class="text-on-surface-variant font-medium text-lg">Já estamos prontos pra te ajudar</p>
</section>
<!-- Selected Vehicle Card -->
<section class="bg-surface-container-low rounded-2xl p-5 flex items-center gap-4 group cursor-pointer active:scale-[0.98] transition-all">
<div class="w-14 h-14 bg-surface-container-high rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-lg text-on-surface">Honda Civic 2019</h3>
<div class="flex items-center gap-2">
<span class="bg-surface-container-highest px-2 py-0.5 rounded text-xs font-mono text-outline uppercase tracking-wider">ABC-1234</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</section>
<!-- BIG SOS BUTTON -->
<section class="pt-4">
<button class="w-full sos-gradient rounded-[24px] p-9 flex flex-col items-center justify-center gap-6 custom-shadow active:scale-[0.97] transition-all relative overflow-hidden group">
<!-- Subtle Glow Effect Background -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="bg-white/15 p-4 rounded-full">
<h4 class="text-3xl font-black italic tracking-tighter text-white uppercase font-headline">MechaGo</h4>
</div>
<div class="text-center space-y-2">
<span class="block text-2xl font-black uppercase tracking-normal text-white font-headline">SOCORRO AGORA</span>
<span class="block text-sm font-medium text-white/80">Toque para solicitar ajuda imediata</span>
</div>
<!-- Pulse indicator -->
<div class="absolute bottom-4 right-4 opacity-20">
<span class="material-symbols-outlined text-white text-4xl">emergency_share</span>
</div>
</button>
</section>
<!-- Quick Actions Bento -->
<section class="grid grid-cols-2 gap-4">
<div class="bg-surface-container p-5 rounded-2xl space-y-3">
<span class="material-symbols-outlined text-primary">handyman</span>
<p class="font-bold text-sm">Serviços Rápidos</p>
</div>
<div class="bg-surface-container p-5 rounded-2xl space-y-3">
<span class="material-symbols-outlined text-primary">support_agent</span>
<p class="font-bold text-sm">Chat Humano</p>
</div>
</section>
</main>
<!-- BottomNavBar (Shared Component) -->
<nav class="fixed bottom-0 left-0 right-0 mx-auto max-w-[420px] z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0e0e0e]/70 backdrop-blur-xl border-t border-white/5 rounded-t-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
<!-- Active Tab: SOS -->
<a class="flex flex-col items-center justify-center text-[#fdd404] bg-[#fdd404]/10 rounded-xl px-4 py-2 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency_share</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">SOS</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">directions_car</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Vehicles</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#ffe484] transition-colors active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Profile</span>
</a>
</nav>
