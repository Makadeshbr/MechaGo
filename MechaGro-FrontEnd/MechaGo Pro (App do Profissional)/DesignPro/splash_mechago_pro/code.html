<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MechaGo PRO - Splash</title>

<style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ffe484 0%, #fdd404 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body text-on-surface">
<!-- Mobile-First Container (Max 420px as requested) -->
<main class="w-full max-w-[420px] min-h-screen bg-surface flex flex-col items-center justify-between p-8 relative overflow-hidden">
<!-- Background Accents (Kinetic Noir Depth) -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[100px] -mr-32 -mt-32"></div>
<div class="absolute bottom-0 left-0 w-48 h-48 bg-primary/10 rounded-full blur-[80px] -ml-24 -mb-24"></div>
<!-- Hero Section: Logo & Identity -->
<div class="flex-1 flex flex-col items-center justify-center w-full space-y-8">
<!-- Brand Logo Mark -->
<div class="relative flex items-center justify-center">
<div class="text-[#fdd404] text-8xl">
<span class="material-symbols-outlined text-9xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute inset-0 flex items-center justify-center pb-4">
<span class="font-headline font-black text-4xl text-black">M</span>
</div>
</div>
<!-- Brand Name & Tagline -->
<div class="text-center space-y-2">
<div class="flex items-baseline justify-center gap-2">
<h1 class="font-headline text-5xl font-black italic tracking-tighter text-primary uppercase">MechaGo</h1>
<span class="font-headline text-3xl font-bold tracking-tighter text-outline-variant uppercase">PRO</span>
</div>
<p class="font-body text-on-surface-variant text-lg tracking-wide">App para profissionais</p>
</div>
</div>
<!-- Action Section: Buttons & Links -->
<div class="w-full space-y-6 pb-8">
<!-- Primary Action -->
<button class="w-full kinetic-gradient py-5 rounded-xl text-on-primary font-headline font-bold text-lg uppercase tracking-widest shadow-lg shadow-black/20 active:scale-[0.98] transition-all">
                Entrar
            </button>
<!-- Secondary Action -->
<div class="text-center space-y-4">
<a class="inline-block font-body text-primary font-semibold text-base hover:text-white transition-colors" href="#">
                    Criar conta
                </a>
</div>
<!-- Subtle Metadata for Professionals -->
<div class="pt-4 flex items-center justify-center gap-4 text-outline-variant/40">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-label text-[10px] uppercase tracking-[0.2em]">Versão 2.4.0</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
</div>
<!-- Decorative "Kinetic" Accent -->
<div class="absolute bottom-2 right-8 opacity-20 pointer-events-none">
<span class="font-headline text-8xl font-black italic text-outline-variant/10 select-none">M_</span>
</div>
</main>
<!-- Content Suppression Check: Splash screens do not require BottomNavBar or SideNav per Protocol -->
</body></html>
