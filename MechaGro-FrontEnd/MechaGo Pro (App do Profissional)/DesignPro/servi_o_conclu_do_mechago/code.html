<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #0e0e0e;
            background-image: radial-gradient(at 0% 0%, rgba(253, 212, 4, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(253, 212, 4, 0.02) 0px, transparent 50%);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<div class="mx-auto max-w-[420px] min-h-screen bg-mesh flex flex-col relative pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-[420px] z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]">
<div class="text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase font-headline">
                MechaGo
            </div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-white/10">
<img alt="Technician profile" class="w-full h-full object-cover" data-alt="Portrait of a smiling professional mechanic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCN8q0IFXA4Ua5xrHPtTRGFd-ouJopFriZiZBZWUkdXggTObC4XQUOLg9QGL-u3ao0SnC56VxTbxB6zokgy-oVLAQWGeTCCc6K7052NLAcm1wp9RaDoerGgZvj0lhX2POyCSdGNKykGnevcq93ZTl0VD-4AzpeRucERxS3AhtTQhf9zytzjjyef2MFpMq_3MQIkTn9uVIwHncn144SkHTkjxOreEXxe_GS-e48xni7mv68QSF5T0p64h5A70z-mGMGbLqYmTkyJFHuS"/>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 px-6 pt-24 space-y-8">
<!-- Status Pill -->
<div class="flex justify-start">
<div class="flex items-center gap-2 bg-tertiary-container/10 px-3 py-1.5 rounded-full">
<span class="w-2 h-2 rounded-full bg-[#dff66e] animate-pulse"></span>
<span class="text-[10px] font-bold tracking-[0.1em] text-tertiary-container uppercase font-label">STATUS: CONCLUÍDO</span>
</div>
</div>
<!-- Title -->
<h1 class="font-headline text-[38px] font-bold leading-none tracking-tight text-on-surface">
                Serviço<br/>Concluído
            </h1>
<!-- Bento Layout for Info Cards -->
<div class="grid gap-4">
<!-- Card VALOR FINAL -->
<div class="bg-surface-container-low rounded-xl p-6 border-l-4 border-primary shadow-2xl relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1 font-label">VALOR FINAL</p>
<div class="flex items-baseline gap-1">
<span class="text-primary font-headline font-bold text-xl uppercase italic">R$</span>
<span class="text-primary font-headline font-black italic text-[32px] tracking-tighter leading-none">115</span>
</div>
</div>
<!-- Card RESUMO -->
<div class="bg-surface-container-low rounded-xl p-6 space-y-4">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">RESUMO</p>
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-lg bg-primary-container/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="space-y-1">
<h3 class="font-headline font-bold text-lg text-on-surface leading-tight">Reparo de Bateria</h3>
<div class="flex items-center gap-2 text-on-surface-variant text-sm">
<span class="material-symbols-outlined text-xs">engineering</span>
<span>Executado por: <span class="text-on-surface font-medium">Carlos Silva</span></span>
</div>
</div>
</div>
</div>
<!-- REGISTRO DE EXECUÇÃO -->
<div class="space-y-4 pt-4">
<div class="flex justify-between items-center">
<h2 class="font-headline font-bold text-sm tracking-widest uppercase text-on-surface">REGISTRO DE EXECUÇÃO</h2>
<span class="bg-error-container text-[10px] font-black px-2 py-0.5 rounded text-white tracking-tighter uppercase font-label">OBRIGATÓRIO</span>
</div>
<!-- Photo Upload Area -->
<button class="w-full aspect-[16/9] rounded-xl border-2 border-dashed border-outline-variant/30 bg-surface-container-lowest flex flex-col items-center justify-center gap-3 active:scale-[0.98] transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors" data-icon="photo_camera">photo_camera</span>
</div>
<p class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase font-label">TIRAR FOTO PARA ENCERRAR</p>
</button>
</div>
</div>
<!-- Transactional Button -->
<div class="pt-6">
<button class="w-full bg-surface-container-highest text-outline cursor-not-allowed font-headline font-black py-5 rounded-xl uppercase tracking-widest flex items-center justify-center gap-2 transition-all" disabled="">
                    CONFIRMAR E AVALIAR
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<p class="text-center text-[10px] text-outline-variant mt-4 uppercase font-bold tracking-tighter">Anexe o registro visual para habilitar a confirmação</p>
</div>
</main>
<!-- Navigation Placeholder (Suppressed per task guidelines for transactional flow) -->
<div class="fixed bottom-0 left-0 w-[420px] bg-gradient-to-t from-background to-transparent h-12 pointer-events-none"></div>
</div>
</body></html>
