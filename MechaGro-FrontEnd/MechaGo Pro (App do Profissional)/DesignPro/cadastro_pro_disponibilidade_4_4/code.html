<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex items-center justify-center min-h-screen p-4">
<!-- App Container -->
<div class="w-full max-w-[420px] bg-background min-h-[800px] flex flex-col relative overflow-hidden">
<!-- Header Shell (Reference: TopAppBar) -->
<header class="fixed top-0 w-full max-w-[420px] z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]">
<button class="text-[#fdd404] hover:opacity-80 transition-opacity active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Space_Grotesk'] tracking-tight text-on-surface text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase">
                MechaGo
            </h1>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant/20">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close up of professional technician face" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4iZrrmCGuVaziSGLrtOE-_ELLlVii2M-IAx58JHAYuI5wgFHtk639i8uyxLrx0tHt5-rPDiF67CMHeUwO1YgWeMQJV-57dud7qQ-RS_MmwHSm_yPO9Gg2gPC8QMUNudtqp6p5GZoKafZjGW2DhQOilWA7QY97sXClaoyyF37CC0s80XgblA-YgAtiW8Ce6yhuauipxDCtIkiWsRY2jXQerLndOVzIuQ_UWwcONHsnKlrdR9uBUgAFkFNULCctSbm_YD-EFaXpQl_s"/>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 pt-24 px-6 pb-32">
<!-- Progress Bar -->
<div class="mb-10">
<div class="flex justify-between items-end mb-2">
<span class="font-headline text-xs font-bold tracking-[0.2em] text-primary-container uppercase">Etapa 4/4</span>
<span class="font-headline text-xs font-bold text-outline-variant uppercase">Concluído</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-full bg-primary-container rounded-full shadow-[0_0_15px_rgba(253,212,4,0.3)]"></div>
</div>
</div>
<!-- Title Section -->
<div class="mb-8">
<h2 class="font-headline text-4xl font-black text-on-surface leading-none -tracking-widest uppercase mb-2">Disponibilidade</h2>
<p class="text-on-surface-variant font-body text-sm leading-relaxed max-w-[280px]">
                    Defina quando e onde você deseja atuar para receber chamados.
                </p>
</div>
<!-- Availability Grid -->
<section class="mb-10">
<h3 class="font-headline text-xs font-bold tracking-widest text-outline-variant uppercase mb-4">Quando você está disponível?</h3>
<div class="grid grid-cols-2 gap-3">
<!-- Card 24h (Selected) -->
<button class="flex flex-col p-4 bg-primary-container text-on-primary rounded-xl text-left transition-all active:scale-95 shadow-lg shadow-primary-container/10">
<span class="material-symbols-outlined mb-3 text-2xl" data-icon="update" style="font-variation-settings: 'FILL' 1;">update</span>
<span class="font-headline font-bold text-sm uppercase leading-tight">24 horas</span>
<span class="text-[10px] font-medium opacity-80 mt-1">Tempo integral</span>
</button>
<!-- Card Diurno -->
<button class="flex flex-col p-4 bg-surface-container-low text-on-surface rounded-xl text-left border border-white/5 hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined mb-3 text-2xl text-primary-container" data-icon="wb_sunny">wb_sunny</span>
<span class="font-headline font-bold text-sm uppercase leading-tight">Diurno</span>
<span class="text-[10px] text-on-surface-variant font-medium mt-1">6h - 22h</span>
</button>
<!-- Card Noturno -->
<button class="flex flex-col p-4 bg-surface-container-low text-on-surface rounded-xl text-left border border-white/5 hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined mb-3 text-2xl text-primary-container" data-icon="dark_mode">dark_mode</span>
<span class="font-headline font-bold text-sm uppercase leading-tight">Noturno</span>
<span class="text-[10px] text-on-surface-variant font-medium mt-1">22h - 6h</span>
</button>
<!-- Card Personalizado -->
<button class="flex flex-col p-4 bg-surface-container-low text-on-surface rounded-xl text-left border border-white/5 hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined mb-3 text-2xl text-primary-container" data-icon="settings_input_component">settings_input_component</span>
<span class="font-headline font-bold text-sm uppercase leading-tight">Personalizado</span>
<span class="text-[10px] text-on-surface-variant font-medium mt-1">Definir horários</span>
</button>
</div>
</section>
<!-- Service Radius -->
<section class="mb-10">
<h3 class="font-headline text-xs font-bold tracking-widest text-outline-variant uppercase mb-4">Raio de atendimento</h3>
<div class="relative w-full h-32 mb-6 rounded-2xl overflow-hidden bg-surface-container-low">
<img alt="Map Preview" class="w-full h-full object-cover opacity-40 grayscale" data-alt="Dark stylized map background with radial glow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8_J5PPtmnnWEkOxKNQIKHR0Q3Adx-UGdIGi1SRLH249A9NV-ZIk6HfpXt4qKEyLxLXHICFhJhpDys5xlEaS6Ma1JPCJMg7EFFW9c_RblGiVNu-fi1dHS9dNm013sqiFnYGw9WSd4c3EP4UTA_b2upXQXAXRHNn5OWKFO0OSwN-U76B10TRnvX-rgwcAef8e3A0NkQG7auTHbQUW1NtblAtGN8F2OUdMiez3JGiasJHlKGG8WWJaMWroMu3Hb-U1J84n6inomqeF7f"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-primary-container/20 border border-primary-container/50 animate-pulse flex items-center justify-center">
<div class="w-4 h-4 rounded-full bg-primary-container shadow-[0_0_15px_#fdd404]"></div>
</div>
</div>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full font-headline text-[10px] font-bold tracking-widest uppercase bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors">5km</button>
<button class="px-5 py-2 rounded-full font-headline text-[10px] font-bold tracking-widest uppercase bg-primary-container text-on-primary shadow-lg shadow-primary-container/10">10km</button>
<button class="px-5 py-2 rounded-full font-headline text-[10px] font-bold tracking-widest uppercase bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors">15km</button>
<button class="px-5 py-2 rounded-full font-headline text-[10px] font-bold tracking-widest uppercase bg-surface-container-high text-on-surface-variant hover:text-on-surface transition-colors">30km</button>
</div>
</section>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 w-full max-w-[420px] p-6 bg-gradient-to-t from-background via-background/90 to-transparent">
<button class="w-full h-14 bg-primary-container text-on-primary font-headline font-black text-sm uppercase tracking-[0.2em] rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Finalizar cadastro
                <span class="material-symbols-outlined text-lg" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</div>
</body></html>
