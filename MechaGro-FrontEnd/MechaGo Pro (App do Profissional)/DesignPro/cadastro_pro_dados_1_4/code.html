<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-primary": "#635200",

              "background": "#0e0e0e",
              "tertiary": "#f6ffc2",
              "surface": "#0e0e0e",
              "secondary-fixed-dim": "#e4d844",
              "on-primary-fixed-variant": "#645300",
              "surface-container-high": "#201f1f",
              "on-tertiary": "#576500",
              "surface-variant": "#262626",
              "primary-fixed-dim": "#edc600",
              "on-primary-container": "#594a00",
              "inverse-primary": "#715d00",
              "secondary-container": "#676000",
              "surface-container": "#1a1919",
              "secondary": "#f3e651",
              "on-surface": "#ffffff",
              "surface-container-lowest": "#000000",
              "on-tertiary-container": "#4f5d00",
              "outline": "#777575",
              "on-error-container": "#ffd2c8",
              "on-error": "#450900",
              "on-secondary-container": "#fff9d2",
              "surface-bright": "#2c2c2c",
              "surface-container-highest": "#262626",
              "secondary-fixed": "#f3e651",
              "primary-fixed": "#fdd404",
              "inverse-surface": "#fcf8f8",
              "surface-tint": "#ffe484",
              "on-secondary-fixed": "#454100",
              "on-tertiary-fixed": "#414d00",
              "on-secondary": "#595300",
              "primary": "#ffe484",
              "error": "#ff7351",
              "on-secondary-fixed-variant": "#645d00",
              "error-dim": "#d53d18",

              "secondary-dim": "#e4d844",
              "error-container": "#b92902",
              "tertiary-fixed-dim": "#d6ee67",
              "on-tertiary-fixed-variant": "#5c6b00",
              "primary-container": "#fdd404",
              "on-background": "#ffffff",

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-active { background-color: #fdd404; }
        .step-inactive { background-color: #262626; }
        .ghost-border { border: 1px dashed rgba(73, 72, 71, 0.4); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#fdd404] hover:opacity-80 transition-opacity active:scale-90" data-icon="menu">menu</span>
<h1 class="text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase font-headline">MechaGo PRO</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-white/5">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
</header>
<main class="pt-24 pb-12 px-6 flex justify-center">
<div class="w-full max-width-[420px] max-w-md flex flex-col gap-8">
<!-- Header Section -->
<section class="flex flex-col gap-4">
<div class="flex flex-col">
<h2 class="text-4xl font-headline font-bold tracking-tight text-on-surface">Cadastro</h2>
<p class="text-on-surface-variant font-medium text-lg">Seus dados</p>
</div>
<!-- Progress Bar -->
<div class="flex gap-2 w-full h-1.5">
<div class="flex-1 rounded-full step-active"></div>
<div class="flex-1 rounded-full step-inactive"></div>
<div class="flex-1 rounded-full step-inactive"></div>
<div class="flex-1 rounded-full step-inactive"></div>
</div>
</section>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Profile Photo Upload -->
<div class="flex flex-col items-center gap-3 py-6 rounded-xl bg-surface-container-low ghost-border">
<div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center text-primary transition-transform active:scale-95 cursor-pointer">
<span class="material-symbols-outlined text-3xl" data-icon="camera_alt">camera_alt</span>
</div>
<span class="text-sm font-semibold text-on-surface-variant uppercase tracking-wider">Foto de perfil</span>
</div>
<!-- Inputs Grid -->
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-outline px-1">Nome completo</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Ex: João Silva" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-outline px-1">CPF ou CNPJ</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="000.000.000-00" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-outline px-1">Telefone</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="(00) 00000-0000" type="tel"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-outline px-1">E-mail</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="mt-4 w-full bg-primary-container text-on-primary-container font-headline font-black py-5 rounded-xl text-lg uppercase tracking-tight flex items-center justify-center gap-2 hover:bg-primary-dim active:scale-[0.98] transition-all shadow-xl shadow-primary/5" type="button">
                    Próximo
                    <span class="material-symbols-outlined font-bold" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Support Text -->
<p class="text-center text-sm text-outline px-8 leading-relaxed">
                Ao prosseguir, você concorda com nossos <span class="text-primary underline underline-offset-4">Termos de Uso</span> e <span class="text-primary underline underline-offset-4">Privacidade</span>.
            </p>
</div>
</main>
<!-- NavigationDrawer (Mobile/Desktop Context) - Visible on interaction but structural reference -->
<nav class="hidden fixed inset-y-0 left-0 z-[60] flex flex-col py-8 bg-[#131313] w-80 rounded-r-3xl shadow-2xl shadow-black">
<div class="px-8 mb-10 flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high overflow-hidden">
<img alt="Pro Technician Avatar" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling mechanic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDb7IDvFDZNrCKnTEB1p5JI7ACvsFsux6yIxX1TkXz7uE7MmvaJ0K85pYqwpr0jbVhjKCEkHUbhhGpOC9D8SSOBKUYNsADH3s0ACyJDziDU57EJM6dX8dU3-f0Mf4bUDq_xRHwluBtO6WElvJbCTazLLEViO1ILHtF55jkohZS-MOYy-FowO8ZINEiapFwj3TVEXTvKcp8MUYAVq-s3hGvRK3b-I7iN1RYfUZiaZ1PSbAUQ9NjQPbOCxeT1wnS0zEEULZ1Vz-DYuwKh"/>
</div>
<div>
<p class="font-headline font-bold text-on-surface">Service Pro</p>
<p class="text-xs text-primary uppercase tracking-tighter font-black">MechaGo Certified</p>
</div>
</div>
<div class="flex flex-col flex-1">
<a class="text-[#fdd404] bg-[#fdd404]/5 border-l-4 border-[#fdd404] font-bold font-headline px-8 py-4 flex items-center gap-4" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                Dashboard
            </a>
<a class="text-gray-400 px-8 py-4 flex items-center gap-4 hover:bg-white/5 transition-all font-headline" href="#">
<span class="material-symbols-outlined" data-icon="work_history">work_history</span>
                History
            </a>
<a class="text-gray-400 px-8 py-4 flex items-center gap-4 hover:bg-white/5 transition-all font-headline" href="#">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
                Earnings
            </a>
<a class="text-gray-400 px-8 py-4 flex items-center gap-4 hover:bg-white/5 transition-all font-headline" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
                Profile
            </a>
</div>
</nav>
</body></html>
