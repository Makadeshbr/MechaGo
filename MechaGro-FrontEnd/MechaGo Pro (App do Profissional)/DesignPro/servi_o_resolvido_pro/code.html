<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#635200",
              "inverse-on-surface": "#565554",
              "background": "#0e0e0e",
              "tertiary": "#f6ffc2",
              "surface": "#0e0e0e",
              "secondary-fixed-dim": "#e4d844",
              "on-primary-fixed-variant": "#645300",
              "surface-container-high": "#201f1f",
              "on-tertiary": "#576500",
              "surface-variant": "#262626",
              "primary-fixed-dim": "#edc600",
              "on-primary-container": "#594a00",
              "inverse-primary": "#715d00",
              "secondary-container": "#676000",
              "surface-container": "#1a1919",
              "secondary": "#f3e651",
              "on-surface": "#ffffff",
              "surface-container-lowest": "#000000",
              "on-tertiary-container": "#4f5d00",
              "outline": "#777575",
              "on-error-container": "#ffd2c8",
              "on-error": "#450900",
              "on-secondary-container": "#fff9d2",
              "surface-bright": "#2c2c2c",
              "surface-container-highest": "#262626",
              "secondary-fixed": "#f3e651",
              "primary-fixed": "#fdd404",
              "inverse-surface": "#fcf8f8",
              "surface-tint": "#ffe484",
              "on-secondary-fixed": "#454100",
              "on-tertiary-fixed": "#414d00",
              "on-secondary": "#595300",
              "primary": "#ffe484",
              "error": "#ff7351",
              "on-secondary-fixed-variant": "#645d00",
              "error-dim": "#d53d18",
              "tertiary-fixed": "#e4fc73",
              "tertiary-container": "#dff66e",
              "secondary-dim": "#e4d844",
              "error-container": "#b92902",
              "tertiary-fixed-dim": "#d6ee67",
              "on-tertiary-fixed-variant": "#5c6b00",
              "primary-container": "#fdd404",
              "on-background": "#ffffff",
              "tertiary-dim": "#d6ee67",
              "on-surface-variant": "#adaaaa",
              "surface-dim": "#0e0e0e",
              "surface-container-low": "#131313",
              "on-primary-fixed": "#433700",
              "primary-dim": "#edc600",
              "outline-variant": "#494847"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0e0e0e; }
        .headline { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased flex justify-center min-h-screen">
<main class="w-full max-w-[420px] bg-background min-h-screen relative flex flex-col pb-24">
<!-- TopAppBar (Based on Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e] max-w-[420px]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#fdd404]">menu</span>
<h1 class="text-2xl font-black italic tracking-tighter text-[#fdd404] uppercase font-['Space_Grotesk']">MechaGo</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold text-[#fdd404] uppercase tracking-widest bg-[#fdd404]/10 px-2 py-0.5 rounded">PRO</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgoLkR_fAslz0eK5vZBjqi-yeOB8p9eMWTugrXu_60dqYZYlKmv8vjyCuwwk5ejsfK47OJMmjECu2u-PjqJP7tgX0lfI_08QvV4xtlEQBfdvy2VnI3kXVM53XdG0NYHX6D72QP-G0LYrTThQTBDJ0yVh9dGHUEPLazyOCebi85O6mLDYkW8Dr8FRW1KU8ljtLHXSzy8cCR1JaXGViEUL8mZfYu5kDud5oDVGTbOoW7IThst9GP4pWFPF3LLJkSvtXE2mX4YEN0Y1Kq"/>
</div>
</div>
</header>
<!-- Content Area -->
<section class="mt-20 px-6 space-y-6">
<!-- Success Status Card -->
<div class="bg-tertiary-container p-5 rounded-xl flex items-center gap-4 shadow-lg shadow-tertiary-container/5 border-none">
<div class="bg-on-tertiary-container/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<h2 class="headline text-on-tertiary-container font-bold text-lg leading-tight uppercase tracking-tight">Serviço resolvido!</h2>
<p class="text-on-tertiary-container/80 text-xs font-medium uppercase tracking-wider">Finalização pendente</p>
</div>
</div>
<!-- Form Section -->
<div class="space-y-5">
<!-- Description -->
<div class="space-y-2">
<label class="text-[10px] font-bold text-outline uppercase tracking-widest ml-1">Descreva o serviço realizado</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-xl p-4 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/40 min-h-[120px] text-sm resize-none" placeholder="Ex: Troca de bateria e limpeza de terminais oxidados..."></textarea>
</div>
<!-- Price Input -->
<div class="space-y-2">
<label class="text-[10px] font-bold text-outline uppercase tracking-widest ml-1">Valor do serviço</label>
<div class="relative flex items-center">
<span class="absolute left-4 headline font-bold text-primary">R$</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-5 pl-12 pr-4 headline text-3xl font-black text-on-surface focus:ring-1 focus:ring-primary/40" type="text" value="95,00"/>
</div>
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-[14px] text-tertiary">info</span>
<p class="text-[10px] text-outline-variant font-medium">Margem sugerida ±25% <span class="text-on-surface-variant font-bold">(R$ 60 — R$ 188)</span></p>
</div>
</div>
<!-- Mandatory Photo Area -->
<div class="space-y-3">
<label class="text-[10px] font-bold text-outline uppercase tracking-widest ml-1">Foto do serviço</label>
<div class="w-full aspect-video border-2 border-dashed border-primary/20 bg-surface-container-lowest rounded-2xl flex flex-col items-center justify-center gap-3 transition-colors hover:bg-surface-container-high group cursor-pointer">
<div class="bg-primary/10 p-4 rounded-full group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-4xl">photo_camera</span>
</div>
<div class="text-center">
<p class="text-error font-black text-[10px] uppercase tracking-[0.2em]">OBRIGATÓRIA PARA ENCERRAR</p>
<p class="text-outline-variant text-[10px] uppercase font-bold mt-1">Clique para capturar imagem</p>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container py-5 rounded-xl headline font-black text-sm uppercase tracking-widest shadow-xl shadow-primary-container/10 active:scale-95 transition-all">
                    ENVIAR PARA APROVAÇÃO DO CLIENTE
                </button>
</div>
</section>
<!-- BottomNavBar (Based on Shared Components JSON) -->
<!-- History tab is active based on "Serviço resolvido" context -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0e0e0e]/70 backdrop-blur-xl max-w-[420px] shadow-[0_-10px_40px_rgba(0,0,0,0.4)] border-t border-white/5">
<div class="flex flex-col items-center justify-center text-gray-500 group">
<span class="material-symbols-outlined text-2xl">emergency_share</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">SOS</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 group">
<span class="material-symbols-outlined text-2xl">directions_car</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Vehicles</span>
</div>
<div class="flex flex-col items-center justify-center text-[#fdd404] bg-[#fdd404]/10 rounded-xl px-3 py-1 group">
<span class="material-symbols-outlined text-2xl">history</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">History</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 group">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Profile</span>
</div>
</nav>
</main>
</body></html>
